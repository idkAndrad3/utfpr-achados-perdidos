services:
  app:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npx prisma migrate deploy && npx prisma db seed && npm run build && npm start"
    environment:
      DATABASE_URL: "file:./dev.db"
      AUTH_SECRET: "${AUTH_SECRET:-troque-este-segredo}"
      AUTH_URL: "http://localhost:3000"
      UPLOAD_DIR: "public/uploads"
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
